global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'lianghua-monitor'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  # Lianghua后端应用
  - job_name: 'lianghua-backend'
    static_configs:
      - targets: ['backend:8000']
    metrics_path: '/metrics'
    scheme: http

  # Prometheus自身
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Redis监控
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']

  # PostgreSQL监控（需要postgres_exporter）
  # - job_name: 'postgres'
  #   static_configs:
  #     - targets: ['postgres-exporter:9187']

  # Node exporter（系统监控）
  # - job_name: 'node'
  #   static_configs:
  #     - targets: ['node-exporter:9100']
