name: 硬编码数据扫描

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  scan-hardcoded-data:
    name: 禁止硬编码市场数据
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 运行硬编码扫描脚本
        run: bash scripts/scan_hardcoded_data.sh
