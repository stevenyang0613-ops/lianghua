apiVersion: v1
kind: Secret
metadata:
  name: {{ include "lianghua.fullname" . }}-secrets
  labels:
    {{- include "lianghua.labels" . | nindent 4 }}
type: Opaque
stringData:
  database-url: "postgresql://{{ .Values.postgresql.auth.username }}:{{ .Values.postgresql.auth.password }}@{{ include "lianghua.fullname" . }}-postgresql:5432/{{ .Values.postgresql.auth.database }}"
  redis-url: "redis://{{ include "lianghua.fullname" . }}-redis-master:6379/0"
  celery-broker-url: "redis://{{ include "lianghua.fullname" . }}-redis-master:6379/0"
  celery-result-backend: "redis://{{ include "lianghua.fullname" . }}-redis-master:6379/1"
  jwt-secret: "{{ randAlphaNum 32 }}"
