apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-notifications-cm
  namespace: argocd
data:
  # 通知模板
  template.app-deployed: |
    email:
      subject: Application {{.app.metadata.name}} deployed successfully
    message: |
      Application {{.app.metadata.name}} has been deployed to {{.app.spec.destination.namespace}}.

      View the application: {{.context.argocdUrl}}/applications/{{.app.metadata.name}}

  template.app-health-degraded: |
    email:
      subject: Application {{.app.metadata.name}} health degraded
    message: |
      Application {{.app.metadata.name}} health status has degraded.

      Current status: {{.app.status.health.status}}

  # 触发器配置
  trigger.on-deployed: |
    - description: Application is synced and healthy
      oncePer: app.status.sync.revision
      send:
        - app-deployed
      when: app.status.operationState.phase in ['Succeeded'] and app.status.health.status == 'Healthy'

  trigger.on-health-degraded: |
    - description: Application health degraded
      send:
        - app-health-degraded
      when: app.status.health.status == 'Degraded'

  # 服务配置
  service.email.gmail: |
    username: $email-username
    password: $email-password
    host: smtp.gmail.com
    port: 587

  service.slack: |
    token: $slack-token

  # 订阅配置
  subscriptions: |
    - recipients:
        - slack:lianghua-alerts
        - email:team@lianghua.com
      triggers:
        - on-deployed
        - on-health-degraded
