# PostgreSQL连接池优化配置
# 使用PgBouncer作为连接池中间件

apiVersion: v1
kind: ConfigMap
metadata:
  name: pgbouncer-config
  namespace: lianghua
data:
  pgbouncer.ini: |
    [databases]
    lianghua = host=postgresql port=5432 dbname=lianghua
    
    [pgbouncer]
    # 连接池模式：transaction级别，最佳并发性能
    pool_mode = transaction
    
    # 监听地址和端口
    listen_addr = 0.0.0.0
    listen_port = 6432
    
    # 连接池大小配置
    # 最大客户端连接数
    max_client_conn = 1000
    
    # 每个数据库的默认连接池大小
    default_pool_size = 50
    
    # 最小连接池大小
    min_pool_size = 10
    
    # 预留连接数（用于管理）
    reserve_pool_size = 5
    reserve_pool_timeout = 3
    
    # 连接生命周期
    # 最大连接存活时间（秒）
    max_db_lifetime = 3600
    
    # 空闲连接超时（秒）
    server_idle_timeout = 300
    
    # 连接重用次数
    max_user_client_connections = 100
    
    # 查询超时
    query_timeout = 30
    
    # 日志配置
    log_connections = 1
    log_disconnections = 1
    log_pooler_errors = 1
    log_stats = 1
    stats_period = 60
    
    # 管理接口
    admin_users = postgres
    stats_users = postgres
    
    # 认证
    auth_type = md5
    auth_file = /etc/pgbouncer/userlist.txt
    
    # 忽略启动参数
    ignore_startup_parameters = extra_float_digits
    
    # 服务端连接重置
    server_reset_query = DISCARD ALL
    
    # 健康检查
    server_check_query = SELECT 1
    server_check_delay = 30
  
  userlist.txt: |
    "postgres" "md5hashedpassword"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgbouncer
  namespace: lianghua
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pgbouncer
  template:
    metadata:
      labels:
        app: pgbouncer
    spec:
      containers:
        - name: pgbouncer
          image: edoburu/pgbouncer:1.19.0
          ports:
            - containerPort: 6432
              name: pgbouncer
          env:
            - name: DATABASE_URL
              value: "postgres://postgres:password@postgresql:5432/lianghua"
            - name: POOL_MODE
              value: "transaction"
            - name: MAX_CLIENT_CONN
              value: "1000"
            - name: DEFAULT_POOL_SIZE
              value: "50"
            - name: MIN_POOL_SIZE
              value: "10"
            - name: RESERVE_POOL_SIZE
              value: "5"
            - name: SERVER_IDLE_TIMEOUT
              value: "300"
          volumeMounts:
            - name: pgbouncer-config
              mountPath: /etc/pgbouncer
              readOnly: true
          resources:
            limits:
              memory: "256Mi"
              cpu: "500m"
            requests:
              memory: "128Mi"
              cpu: "100m"
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -h
                - localhost
                - -p
                - "6432"
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -h
                - localhost
                - -p
                - "6432"
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: pgbouncer-config
          configMap:
            name: pgbouncer-config
---
apiVersion: v1
kind: Service
metadata:
  name: pgbouncer
  namespace: lianghua
spec:
  ports:
    - port: 6432
      targetPort: 6432
  selector:
    app: pgbouncer
---
# PostgreSQL性能调优配置
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgresql-tuning
  namespace: lianghua
data:
  postgresql.conf: |
    # 内存配置
    shared_buffers = 256MB
    effective_cache_size = 1GB
    work_mem = 16MB
    maintenance_work_mem = 256MB
    
    # WAL配置
    wal_buffers = 16MB
    checkpoint_completion_target = 0.9
    max_wal_size = 2GB
    min_wal_size = 1GB
    
    # 连接配置
    max_connections = 200
    superuser_reserved_connections = 5
    
    # 查询优化
    random_page_cost = 1.1
    effective_io_concurrency = 200
    default_statistics_target = 100
    
    # 并行查询
    max_worker_processes = 8
    max_parallel_workers_per_gather = 4
    max_parallel_workers = 8
    max_parallel_maintenance_workers = 4
    
    # 日志配置
    log_min_duration_statement = 1000
    log_checkpoints = on
    log_connections = on
    log_disconnections = on
    log_lock_waits = on
    
    # 自动清理
    autovacuum = on
    autovacuum_max_workers = 3
    autovacuum_naptime = 1min
    autovacuum_vacuum_scale_factor = 0.1
    autovacuum_analyze_scale_factor = 0.05
    
    # 慢查询
    track_activities = on
    track_counts = on
    track_io_timing = on
    track_functions = all
