# 西部量化可转债策略 V3.0 - AlertManager配置
# 文件: alertmanager.yml

global:
  # SMTP配置
  smtp_smarthost: 'smtp.xb-strategy.com:587'
  smtp_from: 'alerts@xb-strategy.com'
  smtp_auth_username: 'alerts@xb-strategy.com'
  smtp_auth_password: 'smtp_password'
  smtp_require_tls: true

  # Slack配置
  slack_api_url: 'https://hooks.slack.com/services/XXX/YYY/ZZZ'

  # 默认解决时间
  resolve_timeout: 5m

# 模板
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# 路由规则
route:
  # 默认接收者
  receiver: 'default-receiver'

  # 分组标签
  group_by: ['alertname', 'severity', 'team']

  # 分组等待时间
  group_wait: 30s

  # 分组间隔
  group_interval: 5m

  # 重复间隔
  repeat_interval: 4h

  # 子路由
  routes:
    # 严重告警 - 立即通知
    - match:
        severity: critical
      receiver: 'critical-alerts'
      group_wait: 10s
      repeat_interval: 1h
      continue: true

    # 警告级别 - 分组通知
    - match:
        severity: warning
      receiver: 'warning-alerts'
      group_wait: 1m
      repeat_interval: 4h

    # 风控团队告警
    - match:
        team: risk
      receiver: 'risk-team'
      routes:
        - match:
            severity: critical
          receiver: 'risk-critical'

    # 数据团队告警
    - match:
        team: data
      receiver: 'data-team'

    # 安全团队告警
    - match:
        team: security
      receiver: 'security-team'

    # 平台团队告警
    - match:
        team: platform
      receiver: 'platform-team'

    # 策略团队告警
    - match:
        team: strategy
      receiver: 'strategy-team'

# 接收者配置
receivers:
  # 默认接收者
  - name: 'default-receiver'
    slack_configs:
      - channel: '#xb-strategy-alerts'
        send_resolved: true
        title: '{{ template "slack.title" . }}'
        text: '{{ template "slack.text" . }}'
        color: '{{ if eq .Status "firing" }}{{ if eq .CommonLabels.severity "critical" }}danger{{ else if eq .CommonLabels.severity "warning" }}warning{{ else }}#439FE0{{ end }}{{ else }}good{{ end }}'

  # 严重告警 - 多渠道通知
  - name: 'critical-alerts'
    slack_configs:
      - channel: '#xb-strategy-critical'
        send_resolved: true
        title: '🚨 [CRITICAL] {{ template "slack.title" . }}'
        text: '{{ template "slack.text" . }}'
        color: 'danger'
    email_configs:
      - to: 'oncall@xb-strategy.com'
        send_resolved: true
        html: '{{ template "email.html" . }}'
    pagerduty_configs:
      - service_key: '<pagerduty_service_key>'
        severity: critical
        description: '{{ template "pagerduty.description" . }}'
    webhook_configs:
      - url: 'https://api.xb-strategy.com/webhooks/alerts'
        send_resolved: true

  # 警告告警
  - name: 'warning-alerts'
    slack_configs:
      - channel: '#xb-strategy-warnings'
        send_resolved: true
        title: '⚠️ [WARNING] {{ template "slack.title" . }}'
        text: '{{ template "slack.text" . }}'
        color: 'warning'

  # 风控团队
  - name: 'risk-team'
    slack_configs:
      - channel: '#risk-alerts'
        send_resolved: true
    email_configs:
      - to: 'risk@xb-strategy.com'
        send_resolved: true

  # 风控严重
  - name: 'risk-critical'
    slack_configs:
      - channel: '#risk-critical'
        send_resolved: true
    email_configs:
      - to: 'risk@xb-strategy.com'
        send_resolved: true
    webhook_configs:
      - url: 'https://api.xb-strategy.com/webhooks/risk-alerts'
        send_resolved: true

  # 数据团队
  - name: 'data-team'
    slack_configs:
      - channel: '#data-alerts'
        send_resolved: true
    email_configs:
      - to: 'data@xb-strategy.com'
        send_resolved: true

  # 安全团队
  - name: 'security-team'
    slack_configs:
      - channel: '#security-alerts'
        send_resolved: true
    email_configs:
      - to: 'security@xb-strategy.com'
        send_resolved: true
    webhook_configs:
      - url: 'https://api.xb-strategy.com/webhooks/security-alerts'
        send_resolved: true

  # 平台团队
  - name: 'platform-team'
    slack_configs:
      - channel: '#platform-alerts'
        send_resolved: true
    email_configs:
      - to: 'platform@xb-strategy.com'
        send_resolved: true

  # 策略团队
  - name: 'strategy-team'
    slack_configs:
      - channel: '#strategy-alerts'
        send_resolved: true
    email_configs:
      - to: 'strategy@xb-strategy.com'
        send_resolved: true

# 抑制规则
inhibit_rules:
  # 服务宕机时，抑制该服务的其他告警
  - source_match:
      alertname: 'ServiceDown'
    target_match_re:
      alertname: '(HighCPUUsage|HighMemoryUsage|HighLatency|HighErrorRate)'
    equal: ['instance']

  # 数据源异常时，抑制数据质量告警
  - source_match:
      alertname: 'DataSourceDown'
    target_match:
      alertname: 'DataQualityDegraded'
    equal: ['source']

  # 熔断触发时，抑制交易相关告警
  - source_match:
      alertname: 'DrawdownCritical'
    target_match_re:
      alertname: '(PositionLimitExceeded|DrawdownWarning)'
    equal: ['portfolio_id']

