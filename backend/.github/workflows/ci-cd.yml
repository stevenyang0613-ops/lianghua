# 西部量化可转债策略 V3.0 - CI/CD配置

name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop, 'release/*' ]
  pull_request:
    branches: [ main, develop ]
  release:
    types: [ published ]

env:
  PYTHON_VERSION: '3.11'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ============ 代码质量检查 ============
  lint:
    name: 代码质量检查
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort mypy pylint
          pip install -r requirements-dev.txt || true

      - name: Black格式检查
        run: black --check --diff app/ || true

      - name: isort导入检查
        run: isort --check-only --diff app/ || true

      - name: Flake8检查
        run: flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: MyPy类型检查
        run: mypy app/ --ignore-missing-imports || true

      - name: 检查 requirements.txt 与 pyproject.toml 同步
        run: |
          python -m scripts.sync_requirements
          if ! git diff --exit-code requirements.txt; then
            echo "::error::requirements.txt 与 pyproject.toml 不同步，请运行 'python -m scripts.sync_requirements' 后重新提交"
            exit 1
          fi
          echo "requirements.txt 与 pyproject.toml 已同步 ✓"

  # ============ 单元测试 ============
  test:
    name: 单元测试
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: xb_strategy_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio pytest-benchmark
          pip install -r requirements.txt || true
          pip install -r requirements-dev.txt || true

      - name: 运行单元测试
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/xb_strategy_test
          REDIS_URL: redis://localhost:6379
        run: |
          pytest app/xb_strategy/tests/ \
            -v \
            --cov=app/xb_strategy \
            --cov-report=xml \
            --cov-report=html \
            --cov-fail-under=70 \
            -m "not slow"

      - name: 上传覆盖率报告
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false

      - name: 上传测试结果
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            htmlcov/
            .coverage
            coverage.xml

  # ============ 集成测试 ============
  integration-test:
    name: 集成测试
    runs-on: ubuntu-latest
    needs: test

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: xb_strategy_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379

      clickhouse:
        image: clickhouse/clickhouse-server:latest
        ports:
          - 8123:8123
          - 9000:9000

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio
          pip install -r requirements.txt || true

      - name: 运行集成测试
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/xb_strategy_test
          REDIS_URL: redis://localhost:6379
          CLICKHOUSE_URL: http://localhost:8123
        run: |
          pytest app/xb_strategy/tests/ -v -m integration || true

  # ============ 性能测试 ============
  performance:
    name: 性能测试
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-benchmark
          pip install -r requirements.txt || true

      - name: 运行性能测试
        run: |
          pytest app/xb_strategy/tests/ -v -m performance --benchmark-only || true

      - name: 上传性能报告
        uses: actions/upload-artifact@v4
        with:
          name: performance-results
          path: .benchmarks/

  # ============ 安全扫描 ============
  security:
    name: 安全扫描
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 安全检查
        run: |
          pip install bandit safety
          bandit -r app/ -f json -o bandit-report.json || true
          safety check --json || true

      - name: 上传安全报告
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: bandit-report.json

  # ============ Docker构建 ============
  build:
    name: 构建Docker镜像
    runs-on: ubuntu-latest
    needs: [test, security]
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 提取Docker元数据
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: 构建并推送
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./deploy/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: 输出镜像摘要
        run: echo ${{ steps.build.outputs.digest }}

  # ============ 部署到测试环境 ============
  deploy-staging:
    name: 部署到测试环境
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: https://staging.xb-strategy.com

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置kubectl
        uses: azure/setup-kubectl@v3

      - name: 配置kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > ~/.kube/config

      - name: 部署到Kubernetes
        run: |
          kubectl set image deployment/scoring-service \
            scoring-service=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -n xb-strategy
          kubectl rollout status deployment/scoring-service -n xb-strategy --timeout=300s

      - name: 健康检查
        run: |
          kubectl wait --for=condition=ready pod -l app=scoring-service -n xb-strategy --timeout=120s

  # ============ 部署到生产环境 ============
  deploy-production:
    name: 部署到生产环境
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release'
    environment:
      name: production
      url: https://api.xb-strategy.com

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置kubectl
        uses: azure/setup-kubectl@v3

      - name: 配置kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > ~/.kube/config

      - name: 部署到Kubernetes
        run: |
          # 蓝绿部署
          kubectl apply -f deploy/kubernetes/deployment.yaml
          kubectl rollout status deployment/scoring-service -n xb-strategy --timeout=600s

      - name: 运行冒烟测试
        run: |
          # 等待服务就绪
          sleep 30
          # 执行健康检查
          curl -f https://api.xb-strategy.com/health || exit 1

      - name: 通知部署成功
        run: |
          echo "Production deployment completed successfully"

  # ============ 发布通知 ============
  notify:
    name: 发送通知
    runs-on: ubuntu-latest
    needs: [build, deploy-production]
    if: always() && github.event_name == 'release'

    steps:
      - name: 发送Slack通知
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: |
            西部量化策略部署完成
            版本: ${{ github.event.release.tag_name }}
            状态: ${{ job.status }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        if: always()
