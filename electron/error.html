<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>页面加载失败</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f5f5f5;
      color: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      flex-direction: column;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }
    h1 { color: #e74c3c; font-size: 24px; margin-bottom: 12px; }
    p { color: #666; margin: 8px 0; font-size: 14px; }
    button {
      margin-top: 20px;
      padding: 10px 24px;
      background: #1890ff;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.2s;
    }
    button:hover { background: #40a9ff; }
    button:active { background: #096dd9; }
  </style>
</head>
<body>
  <h1>✨ 页面加载失败</h1>
  <p>无法加载应用页面，请检查网络或重试。</p>
  <button id="retry">重新加载</button>
  <script>
    document.getElementById('retry').onclick = function() {
      if (window.electronAPI && window.electronAPI.retryFrontendLoad) {
        window.electronAPI.retryFrontendLoad();
      } else {
        window.location.reload();
      }
    };
  </script>
</body>
</html>
